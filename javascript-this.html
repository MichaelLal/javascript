<!DOCTYPE html>
<html>
<body>
<h1>The <b>this</b> Keyword</h1>
<p>The <b>this</b> keyword makes it possible to use the same method with different objects.</p>

<p id="demo"></p>

<script>
const person1 = {
  name: "John",
  hello: function() {
    return "Hello " + this.name;
  }
};

const person2 = {
  name: "Anna",
  hello: function() {
    return "Hello " + this.name;
  }
};

document.getElementById("demo").innerHTML = person1.hello();
</script>

</body>
</html>
